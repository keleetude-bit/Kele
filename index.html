<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Coran Mot à Mot</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; direction: ltr; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        
        /* Style des versets */
        .verset { margin-bottom: 40px; display: flex; flex-wrap: wrap; flex-direction: row-reverse; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .verset-number { background: #2c3e50; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-left: 10px; margin-top: 10px; }

        /* Style du bloc Mot à Mot */
        .mot-block { display: flex; flex-direction: column; align-items: center; margin: 10px; min-width: 60px; }
        .arabe { font-size: 28px; font-family: 'Amiri', serif; color: #1a5d1a; margin-bottom: 5px; font-weight: bold; }
        .francais { font-size: 14px; color: #666; text-align: center; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titre-sourate">Chargement...</h1>
    <div id="coran-content"></div>
</div>

<script>
    // Ici, tu changes juste le nom du fichier pour charger une autre sourate
    const fichierSourate = 'sourate_48.json'; 

    async function chargerSourate() {
        try {
            // Remarque : Pour tester en local, il faut un serveur (ou mettre le JSON directement dans une variable)
            const response = await fetch(fichierSourate);
            const data = await response.json();

            document.getElementById('titre-sourate').innerText = "Sourate " + data.numero + " : " + data.nom;
            
            let html = "";
            data.versets.forEach(verset => {
                html += `<div class="verset">`;
                html += `<div class="verset-number">${verset.id}</div>`;
                
                verset.mots.forEach(mot => {
                    html += `
                        <div class="mot-block">
                            <div class="arabe">${mot.ar}</div>
                            <div class="francais">${mot.fr}</div>
                        </div>`;
                });
                
                html += `</div>`;
            });

            document.getElementById('coran-content').innerHTML = html;
        } catch (error) {
            console.error("Erreur de chargement:", error);
            document.getElementById('titre-sourate').innerText = "Erreur de chargement du fichier JSON";
        }
    }

    chargerSourate();
</script>

</body>
</html>
